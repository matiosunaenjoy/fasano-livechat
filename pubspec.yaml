name: empresa_chat
description: Chat app for Fasano Telegram
publish_to: 'none'

environment:
  sdk: '^3.5.0'

dependencies:
  flutter:
    sdk: flutter

  equatable: ^2.0.7
  uuid: ^4.5.1
  path_provider: ^2.1.5

  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_messaging: ^15.2.4
  firebase_storage: ^12.4.4

  flutter_local_notifications: ^18.0.1

  flutter_image_compress: ^2.4.0
  image_picker: ^1.1.2
  file_picker: ^8.3.7
  flutter_sound: ^9.18.0
  permission_handler: ^11.3.1

  photo_view: ^0.15.0
  cached_network_image: ^3.4.1
  video_player: ^2.9.5
  chewie: ^1.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/fasano-icon.png"
